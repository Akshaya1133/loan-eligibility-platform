<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Assessment Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom px-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold">📝 Loan Assessment Form</a>
        <a href="/dashboard" class="btn btn-outline-light btn-custom">Dashboard</a>
    </div>
</nav>

<div class="container py-5">
    <div class="glass-card">

        <h1 class="mb-4">Apply for Loan Eligibility Check</h1>

        <form method="POST">

            <h4 class="mb-3">👤 Personal Information</h4>
            <div class="row g-3 mb-4">

                <div class="col-md-4">
                    <label>Gender</label>
                    <select name="Gender" class="form-select" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Marital Status</label>
                    <select name="Married" class="form-select" required>
                        <option value="Yes">Married</option>
                        <option value="No">Single</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Dependents</label>
                    <select name="Dependents" class="form-select" required>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3+</option>
                    </select>
                </div>

            </div>

            <h4 class="mb-3">🎓 Employment Details</h4>
            <div class="row g-3 mb-4">

                <div class="col-md-6">
                    <label>Education</label>
                    <select name="Education" class="form-select" required>
                        <option value="Graduate">Graduate</option>
                        <option value="Not Graduate">Not Graduate</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label>Self Employed</label>
                    <select name="Self_Employed" class="form-select" required>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>

            </div>

            <h4 class="mb-3">💰 Financial Details</h4>
            <div class="row g-3 mb-4">

                <div class="col-md-6">
                    <label>Applicant Income</label>
                    <input type="number" class="form-control" name="ApplicantIncome" required>
                </div>

                <div class="col-md-6">
                    <label>Coapplicant Income</label>
                    <input type="number" class="form-control" name="CoapplicantIncome" required>
                </div>

            </div>

            <h4 class="mb-3">🏦 Loan Details</h4>
            <div class="row g-3 mb-4">

                <div class="col-md-4">
                    <label>Loan Amount</label>
                    <input type="number" class="form-control" name="LoanAmount" required>
                </div>

                <div class="col-md-4">
                    <label>Loan Term (Months)</label>
                    <input type="number" class="form-control" name="Loan_Amount_Term" required>
                </div>

                <div class="col-md-4">
                    <label>Credit History</label>
                    <select name="Credit_History" class="form-select" required>
                        <option value="1">Good</option>
                        <option value="0">Bad</option>
                    </select>
                </div>

            </div>

            <h4 class="mb-3">📍 Property Details</h4>
            <div class="row g-3 mb-4">

                <div class="col-md-6">
                    <label>Property Area</label>
                    <select name="Property_Area" class="form-select" required>
                        <option value="Urban">Urban</option>
                        <option value="Semiurban">Semiurban</option>
                        <option value="Rural">Rural</option>
                    </select>
                </div>

            </div>

            <button type="submit" class="btn btn-success btn-lg btn-custom w-100">
                Predict Loan Eligibility
            </button>

        </form>

    </div>
</div>

</body>
</html>
