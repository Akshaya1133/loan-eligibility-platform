<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom px-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold">🏦 LoanAI User Portal</a>
        <a href="/logout" class="btn btn-danger btn-custom">Logout</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="glass-card mb-5">
        <h1>Hello, {{ user.full_name }} 👋</h1>
        <p class="lead">
            Welcome to your quick loan assessment workspace.
        </p>
    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="glass-card text-center">
                <h3>💳 Loan Assessment</h3>
                <p class="mt-3">
                    Start a fresh eligibility prediction.
                </p>
                <a href="/predict" class="btn btn-success btn-custom">
                    Start Prediction
                </a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="glass-card text-center">
                <h3>🤖 AI Engine</h3>
                <h2 class="mt-3">Random Forest</h2>
                <p>Real ML model using banking dataset</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="glass-card text-center">
                <h3>📈 Performance</h3>
                <h1 class="mt-3">78%</h1>
                <p>Model prediction accuracy</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
